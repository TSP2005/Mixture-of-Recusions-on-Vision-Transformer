name: mor_vit_train

wandb: true
wandb_mode: online
wandb_entity: efficient-ai-projects
wandb_project: mor-vit-colab
wandb_run_name: null
output_dir: /content/drive/MyDrive/checkpoints/mor_vit
wandb_run_id: null

tensorboard: false
tensorboard_dir: null

resume_from_checkpoint: false
resume_step: null

dataset: imagenet_1k
weights: null
total_batch_size: 128
per_device_train_batch_size: 128
gradient_accumulation_steps: 1
batch_size_rampup_steps: null
max_length: 196  # Patch count (14x14 patches for 224x224 images)
add_bos_token: false
global_shuffling: true
local_shuffling: true

model: mor_vit
model_name_or_path: /content/drive/MyDrive/pretrained/vit_base_patch14
model_config: null
attn_implementation: flash_attention_2
use_pretrained_weights: true

recursive:
  enable: true
  base_depth: null
  num_recursion: 3
  sharing: cycle
  ln_share: true
  initialization: stepwise

kv_sharing:
  enable: false
  base_depth: null
  num_recursion: null
  sharing: null
  update_cache: false

relaxation:
  enable: false
  skip_first_loop: false
  method: null

mor:
  enable: true
  type: expert
  capacity: null
  rand_router: false
  router_type: linear
  z_loss: true
  z_coeff: 0.00001
  temp: 1.0
  expert:
    cap_warmup_step: 0
    router_func: sigmoid
    alpha: 0.1
    sampling: aux_loss
    include_first: true
    coeff: 0.001
    gating: weighted

lr_scheduler_type: warmup_stable_decay
lr_scheduler_kwargs:
  num_decay_steps: 15000
  decay_type: linear
learning_rate: 3e-3
adam_beta1: 0.9
adam_beta2: 0.95
weight_decay: 0.1
precision: bf16
max_grad_norm: 1.0

num_train_steps: 15000
stop_steps: 15000
num_warmup_steps: 750
save_interval: 0.25
save_steps: null
fixed_save_steps: null
save_total_limit: 5
logging_steps: 100
dataloader_num_workers: 2
gradient_checkpointing: true

evaluation:
  enable: false
  eval_steps: 5
  batch_size: 64
  tasks: imagenet_1k
  device: cuda
  num_fewshot: null